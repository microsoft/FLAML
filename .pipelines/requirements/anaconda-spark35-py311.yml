#
# CPU Environment for Python using Python 3.11
#


# Conda environment for Spark 3.5 and Python 3.11
#

name: Fabric13Python311CPU
channels:
  - microsoft
  - pytorch
  - defaults

dependencies:
  #
  # We take the microsoft-pytorch-env as the base environment, and extend it with additional packages
  #
  - microsoft-pytorch-env=2024.3.0    # Microsoft PyTorch Environment

  #
  # Utilities
  #
  - liac-arff=2.5.0         # A module for read and write ARFF files in Python.
  - markdown=3.4.1          # Python implementation of Markdown.
  - pandasql=0.7.3          # sqldf for pandas
  - prettytable=3.5.0       # A simple Python library for easily displaying tabular data in a visually appealing ASCII table format.
  - pythonnet=3.0.1         # Python for .NET is a package that gives Python programmers nearly seamless integration with the .NET Common Language Runtime (CLR) and provides a powerful application scripting tool for .NET developers.
  - ruamel.yaml.clib=0.2.7  # The C based reader/scanner and emitter for ruamel.yaml
  - typed-ast=1.5.5         # A Python 3 package that provides a Python 2.7 and Python 3 parser similar to the standard ast library
  - virtualenv=20.26.1      # Virtual Python Environment builder
  - geopy=2.4.1             # Python Geocoding Toolbox

  #
  # Core Data Science
  #
  - mlflow-skinny=2.12.2    # An open source platform for the machine learning lifecycle
  - plotly=5.22.0           # An interactive, browser-based graphing library for Python
  - joblib==1.2.0           # Lightweight pipelining in Python, flaml's dependency

  #
  # Training
  #
  - catboost=1.2.3            # [FLAML Dependency] A fast, scalable, high performance Gradient Boosting on Decision Trees library, used for ranking, classification, regression and other machine learning tasks.
  - lightgbm=4.5.0            # Gradient boosting framework
  - pytorch-lightning=2.3.0   # [FLAML Dependency] The lightweight PyTorch wrapper for high-performance AI research. Scale your models, not the boilerplate.
  - transformers=4.37.2       # [FLAML Dependency] State-of-the-art Natural Language Processing for TensorFlow 2.0 and PyTorch
  - xgboost=2.0.3            # Scalable, Portable and Distributed Gradient Boosting

  #
  # Explainable ML
  #
  - shap=0.42.1       # A unified approach to explain the output of any machine learning model.

  #
  # AutoML
  #
  - datasets=2.19.1           # A lightweight and extensible library to easily share and access datasets and evaluation metrics for Natural Language Processing (NLP)
  - prophet=1.1.5             # Tool for producing high quality forecasts for time series data that has multiple seasonality with linear or non-linear growth.
  - openml=0.12.2             # Python API for OpenML, an online platform for open science collaboration in machine learning.

  - pip:
    - pyspark==3.5.1.5.4.20240407          # Apache Spark
    #
    # NotebookUtil requirements
    #
    - powerbiclient==3.1.1     # Microsoft Power BI REST API Client Library for Python
    #
    # LibraryMetadataCooker requirements
    #
    - mypy==1.4.1              # A static type checker for Python
    #
    # Impulse requirements
    #
    - fluent-logger==0.10.0    # A structured logger for Fluentd (Python)
    #
    # Data Science requirements
    #
    # - semantic-link-sempy==0.7.7          # Sempy core library
    # - synapseml-mlflow==1.0.26            # DS requirement
    # - synapseml-utils==1.0.22.post1       # A common utilities library for DS, specify a definite version to avoid auto upgrade
    # - flaml[synapse]==2.2.0.post1            # A fast and lightweight AutoML system
    #
    # Data Wrangler Dependencies
    #
    - prose.pandas2pyspark==8.35.0rc20240513101   # Translate custom pandas code to PySpark code for custom operations
    - prose.suggestions==9.0.0                    # Generate operation suggestions
    #
    # Incompatible with microsoft-pytorch-env
    #
    - docker==7.0.0         # A Python library for the Docker Engine API
    - interpret==0.6.0      # Interpretability and explainability of machine learning models
    #
    # Unavailable in Anaconda repository
    #
    - adlfs==2024.2.0       # Azure Datalake File System
    - pyperclip==1.8.2      # A cross-platform clipboard module for Python
    #
    # Kqlmagic
    #
    - KqlmagicCustom==0.1.114.post25   # Jupyter notebook extension that enables notebook authors to write and run Kusto Query Language (KQL) queries in notebook cells.
