#
# CPU Environment for Python using Python 3.11
#


# Conda environment for Spark 3.5 and Python 3.11
#

name: Fabric13Python311CPU
channels:
  - pytorch
  # - conda-forge
  - defaults

dependencies:
  #
  # Core
  #
  - conda=24.1.2
  - ipython=8.20.0          # Productive Interactive Computing
  - ipywidgets=8.1.1
  - jupyter_server=2.12.3
  - pip=23.3.2
  - python=3.11
  - virtualenv=20.25.0

  #
  # Utilities
  #
  - aiohttp=3.8.6           # Asynchronous HTTP Client/Server for asyncio and Python
  - beautifulsoup4=4.12.3   # Python library designed for screen-scraping
  - certifi=2023.7.22       # Dependency of spark
  - docker-py=7.0.0         # Dependency of azureml-core
  - geopy=2.4.1             # Python Geocoding Toolbox.
  - html5lib=1.1            # HTML parser based on the WHATWG HTML specification
  - imageio=2.34.0          # A Python library for reading and writing image data
  - isodate=0.6.1           # An ISO 8601 date/time/duration parser and formatter.
  - liac-arff=2.5.0         # A module for read and write ARFF files in Python.
  - lxml=5.1.0              # Processing XML and HTML in Python
  - markdown=3.6            # Python implementation of Markdown.
  - openpyxl=3.1.2          # A Python library to read/write Excel 2010 xlsx/xlsm files
  - pandasql=0.7.3          # sqldf for pandas
  - prettytable=3.10.0      # A simple Python library for easily displaying tabular data in a visually appealing ASCII table format.
  - pyperclip=1.8.2         # A cross-platform Python module for copy and paste clipboard functions
  - pythonnet=3.0.3         # Python for .NET is a package that gives Python programmers nearly seamless integration with the .NET Common Language Runtime (CLR) and provides a powerful application scripting tool for .NET developers.
  - regex=2023.12.25        # Alternative regular expression module, to replace re
  - ruamel.yaml=0.18.6      # A YAML 1.2 loader/dumper package for Python
  - ruamel.yaml.clib=0.2.8  # The C based reader/scanner and emitter for ruamel.yaml
  - typed-ast=1.5.5         # A Python 3 package that provides a Python 2.7 and Python 3 parser similar to the standard ast library
  - urllib3=1.26.19          # HTTP library with thread-safe connection pooling, file post, and more.y, downgrade to meet chromadb's requirement.

  #
  # Azure Data Sources
  #
  - adlfs=2024.2.0          # fsspec-compatible Azure Datalake and Azure Blob Storage access
  - azure-storage-file-datalake=12.14.0    #ADLS Gen2 specific API support made available in Storage SDK
  - azure-core=1.29.4       # Azure Core Client Library for Python
  - pyodbc=5.1.0            # DB API Module for ODBC

  #
  # Core Data Science
  #
  - matplotlib=3.8.3        # Publication quality figures in Python
  - mlflow-skinny=2.11.3    # An open source platform for the machine learning lifecycle
  - pandas=2.1.4            # High-performance, easy-to-use data structures and data analysis tools
  - plotly=5.19.0           # An interactive, browser-based graphing library for Python
  - pyarrow=15.0.0          # Python libraries for Apache Arrow
  - scikit-learn=1.4.1.post1      # A set of python modules for machine learning and data mining
  - seaborn=0.13.2          # Statistical data visualization

  #
  # Training
  #
  - lightgbm=4.3.0                  # Gradient boosting framework
  - pytorch=2.2.1=*_cpu_*           # An optimized tensor library for deep learning using GPUs and CPUs.
  - tensorflow=2.15.0=cpu_*         # An open source machine learning framework for everyone.
  - xgboost=1.7.6=cpu_*             # Scalable, Portable and Distributed Gradient Boosting

  #
  # Explainable ML
  #
  - interpret=0.6.0         # Fit interpretable models. Explain blackbox machine learning.
  - shap=0.45.0=cpu_*       # A unified approach to explain the output of any machine learning model.

  - pip:
    - pyspark==3.5.1.5.4.20240407          # Apache Spark
    #
    # NotebookUtil requirements
    #
    - powerbiclient==3.1.1     # Microsoft Power BI REST API Client Library for Python
    #
    # LibraryMetadataCooker requirements
    #
    - mypy==1.4.1              # A static type checker for Python
    #
    # Impulse requirements
    #
    - fluent-logger==0.10.0    # A structured logger for Fluentd (Python)
    #
    # Data Science requirements
    #
    - semantic-link-sempy==0.7.2    # Sempy core library
    # - synapseml-mlflow==1.0.24      # DS requirement
    - synapseml-utils==1.0.20.post2       # A common utilities library for DS, specify a definite version to avoid auto upgrade
    #
    # Data Wrangler Dependencies
    #
    - prose.pandas2pyspark==8.35.0rc20240513101
