channels:
  - pytorch
  # - conda-forge
  - defaults
dependencies:
  - conda=22.9.0
  - ipython=8.14.0          # Productive Interactive Computing
  - ipywidgets=8.0.7
  - jupyter_server=2.7.3
  - pip=23.1.2
  - python=3.10
  - virtualenv=20.23.1
  - pyarrow=12.0.1
  - lightgbm=4.0.0
  - xgboost=1.7.6=cpu_*
  - scipy=1.13.0
  - pandas=2.0.3
  - scikit-learn=1.3.0
  - pytest=8.2.0
  - coverage=7.5.0
  - pre-commit=3.7.0
  - catboost=1.2.5
  - optuna=3.6.0
  - openml=0.12.2
  - statsmodels=0.14.1
  - psutil=5.9.8
  - dataclasses=0.8
  - accelerate=0.30.1
  - transformers[torch]=4.41.1  # >4.36.2 or <4.36 https://github.com/huggingface/transformers/pull/28122
  - datasets=2.19.0
  - nltk=3.8.1
  - hcrystalball=0.1.12
  - pytorch=2.0.1=*_cpu_*
  - torchvision=0.15.2
  - mkl=2024.0.0
  - seqeval=1.2.2
  - prophet=1.1.5
  # the slow speed seems only happens when input is dataframe
  # the slow speed comes from flaml/automl/automl.py:self.*_signature = infer_signature(..)
  # which related to the mlflow version. Try to change to 2.9.0 to test
  # synapseml cannot correctly installed when mlflow < 2.9.0
  # the speed of test/automl/test_notebook_example.py will be slow when mlflow >2.9.2
  - mlflow-skinny=2.13.0
  - joblib==1.3.2
  - nbconvert=7.16.3
  - nbformat=5.10.4
  - ipykernel=6.29.3
  - tensorboardX=2.6  # test_forecast_panel
  - requests=2.31.0  # https://github.com/docker/docker-py/issues/3113
  - packaging=23.2
  - pydantic=1.10.14
  - sympy=1.12
  - libxcrypt=4.4.36
  - pytorch-lightning=2.2.2
  - pip:
    - thop==0.1.1-2209072238
    - rgf-python==3.12.0
    - rouge_score==0.1.2
    - pyspark==3.4.1
    - joblibspark==0.5.2
    - wolframalpha==5.0.0
    - pytorch-forecasting==1.0.0
    - databricks_cli==0.18.0
    - lightning==2.5.6  # fix torch pickle issue with 2.6.0
