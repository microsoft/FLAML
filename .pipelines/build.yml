parameters:
  - name: publishToArtifactFeed
    type: boolean

stages:
- stage: Build
  jobs:
  - job: PreCheck
    pool:
      type: windows
    condition: succeeded()
    variables:
    - name: ob_outputDirectory
      value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
    steps:
    - powershell: |
        $url="$(System.CollectionUri)/$(System.TeamProject)/_apis/git/repositories/$(Build.Repository.ID)/commits/$(Build.SourceVersion)/changes?api-version=5.1"
        $result = Invoke-RestMethod -Uri $url -Headers @{Authorization = "Bearer $(System.AccessToken)"} -Method GET
        $changesPath = $result.changes | ForEach-Object { $_.item.path }
        echo "##vso[task.setvariable variable=build;isOutput=true]$False"
        echo "##vso[task.setvariable variable=flaml;isOutput=true]$False"
        foreach($path in $changesPath){
          echo $path
          if($path -like '*conda-build*'){
            echo "CONDA.build=True"
            echo "##vso[task.setvariable variable=build;isOutput=true]$True"
            break
          }
        }
        foreach($path in $changesPath){
          echo $path
          if(($path -like '*flaml/*' -and $path -notlike '*flaml/version.py') -or $path -like '*test*' -or $path -like '*build.yml' -or $path -like '*install_python.yml'){
            echo "CONDA.flaml=True"
            echo "##vso[task.setvariable variable=flaml;isOutput=true]$True"
            break
          }
        }
      name: CONDA

  - job: UnitTests
    # continueOnError: true
    timeoutInMinutes: 180
    cancelTimeoutInMinutes: 0
    pool:
      type: linux
    dependsOn: PreCheck
    condition: and(succeeded(), or(startsWith(variables['Build.SourceBranch'], 'refs/heads/main'), and(startsWith(variables['Build.SourceBranch'], 'refs/pull/'), eq(dependencies.PreCheck.outputs['CONDA.flaml'], 'true'))))
    strategy:
      matrix:
        Python310-Spark34-notspark:
          python.version: '3.10'
          spark.version: '3.4.1'
          ut.test_type: 'notspark'
        Python310-Spark34-spark:
          python.version: '3.10'
          spark.version: '3.4.1'
          ut.test_type: 'spark'
        Python311-Spark35-notspark:
          python.version: '3.11'
          spark.version: '3.5.1'
          ut.test_type: 'notspark'
        Python311-Spark35-spark:
          python.version: '3.11'
          spark.version: '3.5.1'
          ut.test_type: 'spark'
        Python312-Spark40-notspark:
          python.version: '3.12'
          spark.version: '4.0.1'
          ut.test_type: 'notspark'
        Python312-Spark40-spark:
          python.version: '3.12'
          spark.version: '4.0.1'
          ut.test_type: 'spark'
        Python313-Spark41-notspark:
          python.version: '3.13'
          spark.version: '4.1.1'
          ut.test_type: 'notspark'
        Python313-Spark41-spark:
          python.version: '3.13'
          spark.version: '4.1.1'
          ut.test_type: 'spark'

    variables:
    - name: ob_outputDirectory
      value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
    - name: ob_artifactSuffix
      value: python$(python.version)_spark$(spark.version)_$(ut.test_type)
    - name: test_type
      value: $(ut.test_type)

    steps:
    - template: install_python.yml@self

    - script: |
        source activate pytest
        which pip
        which python
        conda env update --name pytest --file .pipelines/requirements/requirement_310.yml
        pip install -e .
        pip list | grep "pyspark"
        conda env export
      condition: contains(variables['python.version'], '3.10')
      displayName: 'Install dependencies for python 3.10'

    - script: |
        source activate pytest
        which pip
        which python
        conda env update --name pytest --file .pipelines/requirements/anaconda-spark35-py311.yml
        conda install torchvision=0.17.1=*cpu* -c pytorch -y
        conda install pydantic -c conda-forge -y
        pip install pytest coverage
        pip install -e .[synapse]
        pip list | grep "pyspark"
        conda env export
      condition: contains(variables['python.version'], '3.11')
      displayName: 'Install dependencies for python 3.11'

    - script: |
        source activate pytest
        which pip
        which python
        conda env update --name pytest --file .pipelines/requirements/anaconda-spark40-py312.yml
        pip install pytest coverage
        pip install -e .[synapse]
        pip list | grep "pyspark"
        conda env export
      condition: contains(variables['python.version'], '3.12')
      displayName: 'Install dependencies for python 3.12'

    - script: |
        source activate pytest
        which pip
        which python
        conda env update --name pytest --file .pipelines/requirements/Python313-CPU.yml
        pip install pytest coverage
        pip install -e .[synapse]
        pip list | grep "pyspark"
        conda env export
      condition: contains(variables['python.version'], '3.13')
      displayName: 'Install dependencies for python 3.13'

    - script: |
        source activate pytest
        python test/check_dependency.py
      condition: succeeded()
      displayName: 'Check first tier dependencies'

    - script: |
        source activate pytest
        conda list
      condition: succeeded()
      displayName: 'Check all installed packages'

    - script: |
        source activate pytest
        which pip
        which python
        pip install pytest-cov>=5 pytest-rerunfailures pytest-xdist openml
        pytest_type=$(test_type)
        echo "Running pytest type: $pytest_type"

        if [ "$pytest_type" == "notspark" ]; then
          export COVERAGE_PROCESS_START=.coveragerc && \
          rm -f .coverage.1 && \
          COVERAGE_FILE=.coverage.1 pytest test \
              --ignore=test/autogen \
              --ignore=test/spark \
              --ignore=test/automl/test_extra_models.py \
              --ignore=test/nlp \
              --ignore=test/automl/test_custom_hp.py \
              --reruns 3 --reruns-delay 10 -n auto -m "not spark" -v \
              --junitxml=junit/test-results1.xml \
              --cov --cov-append
        else
          export COVERAGE_PROCESS_START=.coveragerc && \
          rm -f .coverage.2 && \
          COVERAGE_FILE=.coverage.2 pytest test \
              --ignore=test/autogen \
              --ignore=test/nlp \
              --ignore=test/automl/test_extra_models.py \
              --ignore=test/spark/test_0sparkml.py \
              --ignore=test/spark/test_internal_mlflow.py \
              --reruns 3 --reruns-delay 10 -n 0 -m "spark" -v \
              --junitxml=junit/test-results2.xml \
              --cov --cov-append

        fi
      condition: succeeded()
      displayName: 'Test with pytest'

    - script: |
        source activate pytest
        which pip
        which python
        pip install numpy==1.23.5 cython==0.29.37
        pip install pytorch-forecasting==0.10.1 --no-build-isolation
        pip install cython==3.0.10
        pip install torch==2.2.1 torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install scikit-learn==1.1.3
        export COVERAGE_PROCESS_START=.coveragerc && \
        rm -f .coverage.3 && \
        COVERAGE_FILE=.coverage.3 pytest test/automl/test_forecast.py::test_forecast_panel -v \
            --junitxml=junit/test-results3.xml \
            --cov --cov-append
      condition: contains(variables['python.version'], '3.11')
      displayName: 'Supplementary for Time Series on Python 3.11'

    - script: |
        source activate pytest
        coverage combine .coverage.*
        coverage xml -i -o coverage.xml
        coverage report -m
      condition: always()
      displayName: 'Generate coverage report'

    - task: PublishTestResults@2
      condition: always()
      inputs:
        testResultsFiles: '**/test-*.xml'
        testRunTitle: 'Publish test results for Python $(python.version)'

    - task: CopyFiles@2
      inputs:
        Contents: '$(System.DefaultWorkingDirectory)/.coverage'
        TargetFolder: $(Build.ArtifactStagingDirectory)
      condition: always()
      displayName: 'Copy .coverage file'

    - task: CopyFiles@2
      condition: always()
      displayName: "Copy Files for job 'Aggregate and Publish Coverage'"
      inputs:
        SourceFolder: '$(Build.ArtifactStagingDirectory)'
        Contents: '.coverage'
        TargetFolder: $(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT/coverage

  - job: CombineAndPublishCoverage
    timeoutInMinutes: 30
    cancelTimeoutInMinutes: 0
    pool:
      type: linux
    condition: succeeded()
    dependsOn: UnitTests
    variables:
    - name: ob_outputDirectory
      value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'

    steps:
    - task: DownloadBuildArtifacts@1
      inputs:
        buildType: 'current'
        downloadType: 'specific'
        downloadPath: '$(System.ArtifactsDirectory)'
      displayName: 'Download coverage artifacts'

    - task: PipAuthenticate@1
      displayName: 'Pip Authenticate'
      inputs:
        artifactFeeds: 'A365/Synapse-Conda, A365/SynapseMaven'

    - script: |
        set -euo pipefail
        pip config set global.index-url https://pkgs.dev.azure.com/msdata/A365/_packaging/Synapse-Conda/pypi/simple/

        echo "Installing coverage tools..."
        pip install coverage

        echo "Creating aggregated coverage directory..."
        mkdir -p $(System.DefaultWorkingDirectory)/aggregated_coverage

        echo "Copying coverage files..."
        i=1
        for file in $(find $(System.ArtifactsDirectory) -name ".coverage"); do
          dest="$(System.DefaultWorkingDirectory)/aggregated_coverage/.coverage_$i"
          cp "$file" "$dest"
          i=$((i+1))
        done

        echo "Coverage files found:"
        ls -la $(System.DefaultWorkingDirectory)/aggregated_coverage/

        echo "Merging coverage reports..."
        # Find all .coverage files in the aggregated_coverage directory
        coverage_files=$(find $(System.DefaultWorkingDirectory)/aggregated_coverage -name ".coverage_*")
        if [ -n "$coverage_files" ]; then
          echo "Creating merged coverage report from: $coverage_files"
          coverage combine $(System.DefaultWorkingDirectory)/aggregated_coverage/.coverage_*
          coverage xml -i -o $(System.DefaultWorkingDirectory)/aggregated_coverage/merged_coverage.xml
          coverage report -m
          echo "Merged coverage report created"
        else
          echo "No coverage files found to merge"
        fi
      displayName: 'Merge Coverage Reports'

    - task: PublishCodeCoverageResults@2
      condition: always()
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/aggregated_coverage/merged_coverage.xml'
      displayName: 'Publish Aggregated Code Coverage'

  - job: PipWheel
    timeoutInMinutes: 90
    cancelTimeoutInMinutes: 0
    pool:
      type: linux
    condition: succeeded()
    strategy:
      matrix:
        Python310-Spark34:
          python.version: '3.10'
          spark.version: '3.4.1'
        Python311-Spark35:
          python.version: '3.11'
          spark.version: '3.5.1'
        Python312-Spark40:
          python.version: '3.12'
          spark.version: '4.0.0'
        Python313-Spark41:
          python.version: '3.13'
          spark.version: '4.1.1'
    variables:
    - name: ob_outputDirectory
      value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
    - name: ob_artifactSuffix
      value: python$(python.version)

    steps:
    - template: install_python.yml@self

    - script: |
        source activate pytest
        which pip
        which python
        pip install pyspark==$(spark.version)
      displayName: 'Install pyspark $(spark.version)'

    - script: |
        # set -euo pipefail
        source activate pytest
        which pip
        which python
        conda env update --name pytest --file .pipelines/requirements/requirement_310.yml
        pip install -e .[synapse]
        pip list | grep "pyspark"
      condition: contains(variables['python.version'], '3.10')
      displayName: 'Install packages and dependencies on python 3.10'

    - script: |
        # set -euo pipefail
        source activate pytest
        which pip
        which python
        conda env update --name pytest --file .pipelines/requirements/anaconda-spark35-py311.yml
        conda install torchvision=0.17.1=*cpu* -c pytorch -y
        conda install pydantic -c conda-forge -y
        pip install -e .[synapse]
        pip list | grep "pyspark"
      condition: contains(variables['python.version'], '3.11')
      displayName: 'Install packages and dependencies on python 3.11'

    - script: |
        # set -euo pipefail
        source activate pytest
        which pip
        which python
        conda env update --name pytest --file .pipelines/requirements/anaconda-spark40-py312.yml
        pip install -e .[synapse]
        pip list | grep "pyspark"
      condition: contains(variables['python.version'], '3.12')
      displayName: 'Install packages and dependencies on python 3.12'

    - script: |
        # set -euo pipefail
        source activate pytest
        which pip
        which python
        conda env update --name pytest --file .pipelines/requirements/Python313-CPU.yml
        pip install -e .[synapse]
        pip list | grep "pyspark"
      condition: contains(variables['python.version'], '3.13')
      displayName: 'Install packages and dependencies on python 3.13'

    - script: |
        # https://www.gnu.org/software/bash/manual/html_node/The-Set-Builtin.html
        # set -u check the unbounded variable, resulting failure of activate; from file in "$ENV/etc/conda/activate.d/*.sh"
        # haven't figure out why some commands is unbounded when conda install environment in the 'Install packages and dependencies' step.
        source activate pytest
        which pip
        which python
        set -euo pipefail
        pythonVersion=$(echo "$(python.version)" | tr -d '.')
        echo "pythonVersion: $pythonVersion"
        if [ "$pythonVersion" == "311" ]; then
            echo "Running for Python 3.11"
            pip install setuptools==69.5.1 packaging==24.2 wheel==0.45.1
            echo "python setup.py sdist bdist_wheel"
            python setup.py sdist bdist_wheel
        elif [ "$pythonVersion" == "310" ]; then
            echo "Running for Python 3.10"
            pip install setuptools==69.5.1 packaging==24.2 wheel==0.45.1
            echo "python setup.py bdist_wheel"
            python setup.py bdist_wheel
        elif [ "$pythonVersion" == "312" ]; then
            echo "Running for Python 3.12"
            pip install setuptools==80.9.0 packaging==24.2 wheel==0.45.1
            echo "python setup.py bdist_wheel"
            python setup.py bdist_wheel
        else
            echo "Running for Python 3.13"
            pip install setuptools==80.9.0 packaging==24.2 wheel==0.45.1
            echo "python setup.py bdist_wheel"
            python setup.py bdist_wheel
        fi
        echo "ls dist"
        ls dist
      condition: succeeded()
      displayName: 'Build Wheel'

    # - script: |
    #     wget https://aka.ms/downloadazcopy-v10-linux
    #     tar -xvf downloadazcopy-v10-linux
    #     sudo rm -rf /usr/bin/azcopy
    #     sudo install --verbose --mode=755 ./azcopy_linux_amd64_*/azcopy /usr/bin/
    #     azcopy copy "dist/*" "https://automlsaeastus.blob.core.windows.net/releases?$(FLAML_AME)" --overwrite=True --recursive
    #   condition: succeeded()
    #   displayName: 'Copy Wheel to AME'

    - task: CopyFiles@2
      inputs:
        Contents: '$(System.DefaultWorkingDirectory)/dist/*'
        TargetFolder: $(Build.ArtifactStagingDirectory)
      condition: succeeded()
      displayName: 'Copy Wheel'

    - task: CopyFiles@2
      condition: succeeded()
      displayName: "Copy Files for 'Publish Wheel' publish task"
      inputs:
        SourceFolder: '$(Build.ArtifactStagingDirectory)/dist'
        Contents: '**'
        TargetFolder: $(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT/flaml-wheel

    - task: TwineAuthenticate@1
      displayName: Twine Authenticate
      condition: succeeded()
      inputs:
        artifactFeed: A365/Synapse-Conda  #Provide the FeedName only if you are using an organization-scoped feed.

    - script: |
        source activate pytest
        pip install twine==6.1.0 packaging==24.2
        python -m twine upload -r Synapse-Conda --config-file $(PYPIRC_PATH) $(System.DefaultWorkingDirectory)/dist/*
      condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
      displayName: 'Upload Azure Artifacts'

  - job: CondaBuild
    timeoutInMinutes: 90
    cancelTimeoutInMinutes: 0
    pool:
      type: linux
    condition: succeeded()
    variables:
    - name: python.version
      value: '3.10'
    - name: ob_outputDirectory
      value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
    - name: ob_artifactSuffix
      value: python$(python.version)
    - name: CONDA_build
      value: $[dependencies.PreCheck.outputs['CONDA.build']]

    steps:
    - script: |
        CONDA_build=$(CONDA_build)
        echo "CONDA.build: $CONDA_build"
      displayName: 'Check CONDA.build'

    - template: install_python.yml@self

    - script: |
        set -euo pipefail
        source activate pytest
        conda install -y "conda-build<=24.11.2" git conda-index -v
        pip install setuptools==69.5.1 packaging==24.2 wheel==0.43.0 pip==25.2
        which python
        python --version
        gcc --version
        g++ --version
        conda --version
        cd conda-build
        # conda config --add channels conda-forge
        # conda config --remove channels defaults
        conda config --set channel_priority strict

        echo "Start conda build py 3.10"
        conda build flaml3.10 --output-folder . --python=3.10

        echo "Start conda build py 3.11"
        conda build flaml3.11 --output-folder . --python=3.11

        echo "Finished conda build"
        conda search flaml -c file://$(System.DefaultWorkingDirectory)/conda-build --override-channels
        bash download_files.sh
        python -m conda_index .
        conda search flaml -c file://$(System.DefaultWorkingDirectory)/conda-build --override-channels
      displayName: 'Create source distribution'

    - task: CopyFiles@2
      inputs:
        Contents: '$(System.DefaultWorkingDirectory)/conda-build/**/*'
        TargetFolder: $(Build.ArtifactStagingDirectory)
      condition: succeeded()
      displayName: 'Copy conda-build'

    - task: CopyFiles@2
      condition: succeeded()
      displayName: "Copy Files for 'Publish conda-build' publish task"
      inputs:
        SourceFolder: '$(Build.ArtifactStagingDirectory)/conda-build'
        Contents: '**'
        TargetFolder: $(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT/flaml-conda

    - script: |
        VERSION=$(grep -oP '(?<=__version__ = ")[^"]*' flaml/version.py)
        if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.post[0-9]+$ ]]; then
          VERSION=${VERSION/.post/-post.}
        fi
        echo "##vso[task.setvariable variable=FLAML_VERSION]$VERSION"
        echo "FLAML_VERSION=$VERSION"
      displayName: 'Extract FLAML_VERSION'

    - task: UniversalPackages@0
      inputs:
        command: 'publish'
        vstsFeedPublish: 'A365/Synapse-Conda'
        vstsFeedPackagePublish: 'flaml'
        publishDirectory: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT/flaml-conda'
        versionOption: 'custom'
        versionPublish: '$(FLAML_VERSION)'
        packagePublishDescription: 'FLAML conda packages'
      displayName: "Upload FLAML conda packages to Artifact Feed"
      condition: and(succeeded(), eq(${{ parameters.publishToArtifactFeed }}, 'true'), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
      continueOnError: false
