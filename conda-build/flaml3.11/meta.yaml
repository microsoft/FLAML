{% set version_match = load_file_regex(
  load_file="flaml/version.py",
  from_recipe_dir=False,
  regex_pattern='^__version__ = "(.+)"') %}
{% set version = version_match[1] %}

package:
  name: "flaml"
  version: {{ version }}

source:
  path: ../../.

build:
  number: 0
  # noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"

requirements:
  build:
    - scikit-learn ==1.2.2
    - pip <=25.2
  host:
    - python
    - pip <=25.2
    - setuptools ==69.5.1
    - wheel ==0.43.0
    - numpy >=1.17.0, <2.0.0
    - scikit-learn ==1.2.2
  run:
    - python
    # The pytorch forecasting 0.10.1 use the deprecate np.float, which is removed after 1.23.5
    - numpy >=1.17.0, <2.0.0
    - lightgbm >=2.3.1
    - xgboost >=0.90,<2.0.0
    - scipy >=1.4.1
    - pandas >=1.1.4
    - scikit-learn ==1.2.2
    - pyspark >=3.2.0
    # # - joblibspark ==0.5.2  # pip
    - catboost >=0.26,<=1.2.5 # [py>=311]
    # optuna required: <3.0.0 for pytorch-forecasting=0.10.1
    - optuna >=2.8.0,<=3.6.1
    - transformers[torch]>=4.37  # >4.36.2 or <4.36 https://github.com/huggingface/transformers/pull/28122
    - accelerate>=0.21.0  # for transformers
    - holidays
    - plotly >=5.16.1
    - pyarrow >=11.0.0
    - statsmodels >=0.12.2
    # # - nni  # pip & conflict with conda deps
    - datasets
    - nltk
    # # - rouge_score  # pip
    - seqeval
    - packaging
    - mlflow-skinny >=2.10.0
    - joblib <=1.3.2
    - prophet >=1.0.1
    - hcrystalball ==0.1.10
    - pytorch-lightning >=2.0.0,<3.0.0
    - torchvision
    - openml
    - pydantic
    - tensorboardX
  run_constrained:
    - pytorch-forecasting >=0.9.0,<=0.10.1

test:
  requires:
    - pytest
  source_files:
    # list all conda related test files here
    # note: keep the conda related tests directly in the test folder, so that bundling to tar.gz includes them
    # or just extend the test_conda_distribution.py file with more tests (and make sure to mark it as conda)
    - test/test_conda_distribution.py
  commands:
    - pytest -m conda

about:
  home: "https://github.com/microsoft/FLAML"
  license: MIT
  license_family: MIT
  license_file:
  summary: "A fast library for automated machine learning and tuning"
  doc_url:
  dev_url:

extra:
  recipe-maintainers:
    - lijiang1
